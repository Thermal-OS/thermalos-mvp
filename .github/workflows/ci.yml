name: ThermalOS CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov ruff

      # FIX: pytest wird aus dem Projektroot gestartet, damit sys.path-Inserts
      # in den Tests korrekt funktionieren. --rootdir stellt sicher, dass
      # pytest den Projektroot als Basis verwendet.
      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: pytest tests/ -v --rootdir=. --tb=short --cov=src --cov-report=term-missing

      # FIX: Lint-Schritt hinzugefügt (ruff – schneller als flake8/pylint)
      - name: Lint with ruff
        working-directory: ${{ github.workspace }}
        run: |
          ruff check src/ tests/ \
            --select=E,W,F,I \
            --ignore=E501 \
            --output-format=github
