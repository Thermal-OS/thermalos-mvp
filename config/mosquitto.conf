# Mosquitto MQTT Broker – Lokale Entwicklungskonfiguration
# Für Produktion: allow_anonymous auf false setzen und Passwortdatei verwenden.

listener 1883
allow_anonymous true

# Persistenz
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
